<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReflexLab</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrnirIh0ilbjNaI-QwKkq0YbEb9DF4Svc",
  authDomain: "reflexlab-eaa4f.firebaseapp.com",
  projectId: "reflexlab-eaa4f",
  storageBucket: "reflexlab-eaa4f.firebasestorage.app",
  messagingSenderId: "443239972835",
  appId: "1:443239972835:web:91eb56886238ea623e2ad6"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let u = null;
let p = null;
let cache = [];
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#0b0014,#05060a);
  color:#eaeaea;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:14px;
  background:#0e0f1a;
  border-bottom:1px solid #222;
}

button{
  background:transparent;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#00ffcc;
  color:#000;
}

.page{display:none;padding:20px;}
.on{display:block;}

.tabs{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:20px;
}

.card{
  width:420px;
  margin:18px auto;
  padding:20px;
  border-radius:12px;
  background:#141428;
  border:1px solid #00ffcc22;
  text-align:center;
}

.box{
  width:420px;
  height:420px;
  margin:auto;
  background:#121225;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

.dot{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#ff3355;
  position:absolute;
}
</style>

<script>

auth.onAuthStateChanged(async x=>{
  u = x;
  if(!u) return;

  const r = db.collection("users").doc(u.uid);
  const s = await r.get();

  if(!s.exists){
    await r.set({
      name: u.displayName,
      last: 0
    });
  }

  p = (await r.get()).data();

  document.getElementById("me").innerText = "@" + p.name;

  openBoard("reaction");
});

function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function logout(){
  auth.signOut();
}

function rename(){
  const week = 604800000;

  if(Date.now() - p.last < week){
    alert("cooldown");
    return;
  }

  const n = prompt("name");
  if(!n) return;

  db.collection("users").doc(u.uid).update({
    name:n,
    last:Date.now()
  });

  p.name = n;
  document.getElementById("me").innerText = "@" + n;
}

function send(test, val){
  if(!u) return;

  db.collection("scores").add({
    uid:u.uid,
    name:p.name,
    test,
    val,
    t:Date.now()
  });
}

let boardData = [];

function openBoard(t){
  db.collection("scores")
  .where("test","==",t)
  .onSnapshot(s=>{
    boardData = [];

    s.forEach(d=>{
      boardData.push(d.data());
    });

    boardData.sort((a,b)=>a.val-b.val);

    document.getElementById("board").innerHTML =
      boardData.slice(0,10).map(x =>
        `<div>${x.name} ${x.val}</div>`
      ).join("");
  });
}

/* reaction */
let st = 0, mode = 0;

function clickBox(){
  const b = document.getElementById("rbox");

  if(mode===0){
    mode = 1;
    b.innerText = "wait";

    setTimeout(()=>{
      st = performance.now();
      mode = 2;
      b.innerText = "click";
    },1000+Math.random()*2500);
  } else {
    send("reaction", Math.round(performance.now()-st));
    mode = 0;
    b.innerText = "click";
  }
}

/* aim */
let score = 0;
let run = false;

function startAim(){
  score = 0;
  run = true;

  const a = document.getElementById("aim");
  a.innerHTML = "";

  spawn();

  setTimeout(()=>{
    run = false;
    send("aim", score);
    a.innerHTML = "";
  },30000);
}

function spawn(){
  if(!run) return;

  const a = document.getElementById("aim");
  const d = document.createElement("div");

  d.className = "dot";
  d.style.left = Math.random()*380+"px";
  d.style.top = Math.random()*380+"px";

  d.onclick = ()=>{
    score++;
    d.remove();
    spawn();
  };

  a.appendChild(d);
}

/* memory */
let lvl = 1, seq = "";

function memStart(){
  seq = "";
  for(let i=0;i<lvl;i++) seq += Math.floor(Math.random()*9);

  document.getElementById("seq").innerText = seq;

  setTimeout(()=>{
    document.getElementById("seq").innerText = "----";
  },1000);
}

function memCheck(){
  const v = document.getElementById("in").value;
  lvl = v === seq ? lvl+1 : 1;
}

/* nav */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("on"));
  document.getElementById(p).classList.add("on");
}

</script>

</head>

<body>

<div class="nav">
<button onclick="go('g')">games</button>
<button onclick="go('b')">board</button>
<button onclick="go('p')">profile</button>

<button onclick="login()">login</button>
<button onclick="logout()">logout</button>
</div>

<div id="me" style="text-align:center;padding:10px;"></div>

<div id="g" class="page on">

<div class="tabs">
<button onclick="show('r')">reaction</button>
<button onclick="show('a')">aim</button>
<button onclick="show('m')">memory</button>
</div>

<div id="r">
<div class="card">
<div id="rbox" class="box" onclick="clickBox()">click</div>
</div>
</div>

<div id="a" style="display:none">
<div class="card">
<div id="aim" class="box"></div>
<button onclick="startAim()">start</button>
</div>
</div>

<div id="m" style="display:none">
<div class="card">
<h3 id="seq"></h3>
<input id="in">
<button onclick="memStart()">start</button>
<button onclick="memCheck()">check</button>
</div>
</div>

</div>

<div id="b" class="page">
<div class="card">
<div id="board"></div>
</div>
</div>

<div id="p" class="page">
<div class="card">
<button onclick="rename()">change name</button>
</div>
</div>

<script>
function show(x){
  ["r","a","m"].forEach(i=>{
    document.getElementById(i).style.display="none";
  });
  document.getElementById(x).style.display="block";
}
</script>

</body>
</html>
