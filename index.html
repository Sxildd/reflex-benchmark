<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reflex Benchmark</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070710;
  color: #00ffcc;
  text-align: center;
}

h1 {
  margin-top: 20px;
  text-shadow: 0 0 15px #00ffcc;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

button {
  background: #111;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 10px;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 10px #00ffcc;
}

.panel {
  width: 420px;
  margin: auto;
  background: #111;
  border: 1px solid #00ffcc33;
  padding: 20px;
  border-radius: 10px;
}

/* TEST BOX */
#box {
  width: 320px;
  height: 320px;
  margin: 20px auto;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  font-size: 18px;
  border: 2px solid #00ffcc;
}

.green { background: #00ff88 !important; }
.red { background: #ff0044 !important; }

/* AIM */
.target {
  position: absolute;
  width: 40px;
  height: 40px;
  background: red;
  border-radius: 50%;
  cursor: crosshair;
}
</style>
</head>

<body>

<h1>REFLEX BENCHMARK v2</h1>

<div class="menu">
<button onclick="show('reaction')">Reaction</button>
<button onclick="show('cps')">CPS</button>
<button onclick="show('memory')">Memory</button>
<button onclick="show('aim')">Aim</button>
</div>

<div class="panel">

<!-- REACTION -->
<div id="reaction">
  <h2>Reaction Test</h2>
  <div id="box">Click to start</div>
  <div id="reactionResult"></div>
</div>

<!-- CPS -->
<div id="cps" style="display:none;">
  <h2>Click Speed Test (5s)</h2>
  <button onclick="startCPS()">Start</button>
  <div id="cpsResult"></div>
</div>

<!-- MEMORY -->
<div id="memory" style="display:none;">
  <h2>Memory Test</h2>
  <p>Remember the sequence:</p>
  <h3 id="sequence"></h3>
  <button onclick="startMemory()">Start</button>
  <input id="memInput">
  <button onclick="checkMemory()">Check</button>
  <div id="memResult"></div>
</div>

<!-- AIM -->
<div id="aim" style="display:none;">
  <h2>Aim Test</h2>
  <p>Click the red circles!</p>
  <div id="aimArea" style="height:300px; position:relative;"></div>
  <div id="aimScore"></div>
  <button onclick="startAim()">Start</button>
</div>

</div>

<script>

// ===================== NAV =====================
function show(id){
  document.querySelectorAll(".panel > div").forEach(d=>{
    d.style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

// ===================== REACTION =====================
let state="idle", startTime, timeout;

const box = document.getElementById("box");

box.onclick = () => {
  if(state==="idle"){
    state="waiting";
    box.innerText="Wait...";
    timeout=setTimeout(()=>{
      box.classList.add("green");
      box.innerText="CLICK!";
      startTime=performance.now();
      state="ready";
    },1000+Math.random()*4000);
  }
  else if(state==="waiting"){
    clearTimeout(timeout);
    box.classList.add("red");
    box.innerText="Too early!";
    setTimeout(resetBox,800);
  }
  else if(state==="ready"){
    let rt=performance.now()-startTime;
    document.getElementById("reactionResult").innerText=
      "Reaction: "+Math.round(rt)+"ms";
    setTimeout(resetBox,800);
    state="idle";
  }
};

function resetBox(){
  box.classList.remove("green","red");
  box.innerText="Click to start";
}

// ===================== CPS =====================
let clicks=0, cpsActive=false;

function startCPS(){
  clicks=0;
  cpsActive=true;
  document.getElementById("cpsResult").innerText="Click anywhere!";

  setTimeout(()=>{
    cpsActive=false;
    document.getElementById("cpsResult").innerText=
      "CPS: "+(clicks/5).toFixed(2);
  },5000);
}

document.addEventListener("click",()=>{
  if(cpsActive) clicks++;
});

// ===================== MEMORY =====================
let seq="";

function startMemory(){
  seq=Math.floor(1000+Math.random()*9000).toString();
  document.getElementById("sequence").innerText=seq;

  setTimeout(()=>{
    document.getElementById("sequence").innerText="????";
  },2000);
}

function checkMemory(){
  let input=document.getElementById("memInput").value;
  document.getElementById("memResult").innerText=
    input===seq?"Correct!":"Wrong!";
}

// ===================== AIM =====================
let aimScore=0;

function startAim(){
  aimScore=0;
  spawnTarget();
}

function spawnTarget(){
  const area=document.getElementById("aimArea");
  area.innerHTML="";

  const t=document.createElement("div");
  t.className="target";
  t.style.left=Math.random()*260+"px";
  t.style.top=Math.random()*260+"px";

  t.onclick=()=>{
    aimScore++;
    document.getElementById("aimScore").innerText="Score: "+aimScore;
    spawnTarget();
  };

  area.appendChild(t);
}

</script>

</body>
</html>
