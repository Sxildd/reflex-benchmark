<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReflexLab SaaS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrnirIh0ilbjNaI-QwKkq0YbEb9DF4Svc",
  authDomain: "reflexlab-eaa4f.firebaseapp.com",
  projectId: "reflexlab-eaa4f",
  storageBucket: "reflexlab-eaa4f.firebasestorage.app",
  messagingSenderId: "443239972835",
  appId: "1:443239972835:web:91eb56886238ea623e2ad6"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let profile = null;

/* ================= AUTH ================= */
auth.onAuthStateChanged(async u=>{
  user = u;

  if(!user){
    document.getElementById("user").innerText="Not logged in";
    return;
  }

  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      username: user.displayName,
      lastChange: 0
    });
  }

  profile = (await ref.get()).data();

  document.getElementById("user").innerText =
    "User: " + profile.username;

  loadLeaderboard("reaction");
});

/* ================= LOGIN ================= */
function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function logout(){
  auth.signOut();
}

/* ================= USERNAME ================= */
function changeUsername(){
  if(!user) return;

  const week = 7*24*60*60*1000;

  if(Date.now() - profile.lastChange < week){
    alert("You can only change username once per week");
    return;
  }

  const name = prompt("New username:");
  if(!name) return;

  db.collection("users").doc(user.uid).update({
    username: name,
    lastChange: Date.now()
  });

  profile.username = name;
  document.getElementById("user").innerText =
    "User: " + name;
}

/* ================= SCORE ================= */
function submitScore(test, score){
  if(!user || !profile) return;

  db.collection("leaderboard").add({
    uid: user.uid,
    name: profile.username,
    test,
    score,
    time: Date.now()
  });
}

/* ================= LEADERBOARD ================= */
let leaderboardCache = [];

function loadLeaderboard(test){
  db.collection("leaderboard")
    .where("test","==",test)
    .onSnapshot(snap=>{
      leaderboardCache = [];

      snap.forEach(d=>{
        leaderboardCache.push(d.data());
      });

      leaderboardCache.sort((a,b)=>a.score-b.score);

      let html="";
      leaderboardCache.slice(0,10).forEach(d=>{
        html+=`<div>${d.name} — ${d.score}</div>`;
      });

      document.getElementById("leaderboard").innerHTML=html;

      updatePercentile();
    });
}

/* ================= PERCENTILE ================= */
function updatePercentile(){
  if(!user || leaderboardCache.length===0) return;

  const userScores = leaderboardCache.map(x=>x.score);
  const myScores = leaderboardCache.filter(x=>x.uid===user.uid);

  if(myScores.length===0) return;

  const best = Math.min(...myScores.map(x=>x.score));

  let better = userScores.filter(x=>x>best).length;

  let percentile = Math.round((better / userScores.length)*100);

  document.getElementById("percentile").innerText =
    "You are faster than ~" + percentile + "% of players";
}

/* ================= REACTION ================= */
let state="idle", startTime, timeout;

function clickBox(){
  const box=document.getElementById("box");

  if(state==="idle"){
    state="waiting";
    box.innerText="Wait...";

    timeout=setTimeout(()=>{
      startTime=performance.now();
      state="ready";
      box.innerText="CLICK!";
      box.classList.add("green");
    },1000+Math.random()*3000);
  }

  else if(state==="ready"){
    let rt=Math.round(performance.now()-startTime);

    document.getElementById("reactionResult").innerText=rt+"ms";

    submitScore("reaction", rt);

    state="idle";
    box.innerText="Click";
    box.classList.remove("green");
  }
}

/* ================= AIM ================= */
let score=0;
let active=false;

function startAim(){
  score=0;
  active=true;

  document.getElementById("aimArea").innerHTML="";
  spawnTarget();

  setTimeout(()=>{
    active=false;
    submitScore("aim", score);
    document.getElementById("aimArea").innerHTML="";
  },30000);
}

function spawnTarget(){
  if(!active) return;

  const area=document.getElementById("aimArea");
  const t=document.createElement("div");
  t.className="target";

  t.style.left=Math.random()*190+"px";
  t.style.top=Math.random()*190+"px";

  t.onclick=()=>{
    score++;
    t.remove();
    spawnTarget();
  };

  area.appendChild(t);
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #120018, #05050a);
  color:#eaeaea;
  text-align:center;
}

button{
  background:transparent;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px 14px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#00ffcc;
  color:black;
}

.card{
  background:rgba(20,20,35,0.85);
  border:1px solid rgba(0,255,204,0.2);
  border-radius:12px;
  padding:20px;
  margin:20px auto;
  width:360px;
  backdrop-filter: blur(10px);
}

#box{
  width:220px;
  height:220px;
  margin:auto;
  background:#1a1a2a;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.green{background:#00ff88 !important;}

#aimArea{
  width:220px;
  height:220px;
  margin:auto;
  position:relative;
  background:#111;
}

.target{
  width:25px;
  height:25px;
  border-radius:50%;
  background:red;
  position:absolute;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ReflexLab</h1>

<div id="user">Not logged in</div>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="changeUsername()">Change Username</button>

<div class="card">
<h2>Reaction</h2>
<div id="box" onclick="clickBox()">Click</div>
<div id="reactionResult"></div>
</div>

<div class="card">
<h2>Aim</h2>
<div id="aimArea"></div>
<button onclick="startAim()">Start Aim</button>
</div>

<div class="card">
<h2>Leaderboard</h2>
<div id="leaderboard"></div>
</div>

<div class="card">
<h2>Profile</h2>
<div id="percentile">Not calculated yet</div>
</div>

</body>
</html>
