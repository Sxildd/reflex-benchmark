<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glitch Reflex</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a12;
  color: #00ffcc;
  text-align: center;
}

h1 {
  margin-top: 20px;
  text-shadow: 0 0 15px #00ffcc;
}

#box {
  width: 300px;
  height: 300px;
  margin: 30px auto;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  font-size: 18px;
  border: 2px solid #00ffcc;
  transition: 0.2s;
}

.green { background: #00ff88 !important; }
.red { background: #ff0044 !important; }

.panel {
  width: 350px;
  margin: auto;
}

#leaderboard {
  margin-top: 20px;
  text-align: left;
  background: #111;
  padding: 10px;
  border: 1px solid #00ffcc33;
}

.warn { color: #ff5555; }
</style>
</head>

<body>

<h1>GLITCH REFLEX</h1>

<div id="box">Click to start</div>
<div id="result"></div>

<div class="panel">
  <h3>Leaderboard (Local)</h3>
  <div id="leaderboard"></div>
</div>

<script>

// ===================== STATE =====================
let state = "idle";
let startTime;
let timeout;

let mouseMoves = [];

const box = document.getElementById("box");
const result = document.getElementById("result");

// ===================== LEADERBOARD =====================
let leaderboard = JSON.parse(localStorage.getItem("lb")) || [];

// ===================== RESET SYSTEM =====================
function resetBox() {
  box.classList.remove("green");
  box.classList.remove("red");
  box.innerText = "Click to start";
  state = "idle";
}

// ===================== MOUSE TRACKING =====================
document.addEventListener("mousemove", (e) => {
  mouseMoves.push(Date.now());
  if (mouseMoves.length > 50) mouseMoves.shift();
});

// ===================== SIMPLE ANTI-CHEAT =====================
function isSuspicious() {
  if (mouseMoves.length < 10) return false;

  let intervals = [];
  for (let i = 1; i < mouseMoves.length; i++) {
    intervals.push(mouseMoves[i] - mouseMoves[i - 1]);
  }

  let avg = intervals.reduce((a,b)=>a+b,0) / intervals.length;
  let variance = intervals.reduce((a,b)=>a + Math.abs(b - avg),0) / intervals.length;

  return variance < 2; // too robotic
}

// ===================== SAVE SCORE =====================
function saveScore(rt) {

  let cheated = false;

  if (rt < 80 || rt > 2000) cheated = true;
  if (isSuspicious()) cheated = true;

  leaderboard.push({
    score: Math.round(rt),
    cheated
  });

  leaderboard.sort((a,b)=>a.score - b.score);
  leaderboard = leaderboard.slice(0, 10);

  localStorage.setItem("lb", JSON.stringify(leaderboard));

  renderLeaderboard();
}

// ===================== CLICK LOGIC =====================
box.onclick = () => {

  if (state === "idle") {
    state = "waiting";
    box.innerText = "Wait for GREEN...";

    timeout = setTimeout(() => {
      box.classList.add("green");
      box.innerText = "CLICK!";
      startTime = performance.now();
      state = "ready";
    }, 1000 + Math.random() * 4000);
  }

  else if (state === "waiting") {
    clearTimeout(timeout);

    box.classList.add("red");
    box.innerText = "Too early!";
    result.innerText = "Invalid run";

    setTimeout(() => {
      resetBox();
    }, 700);
  }

  else if (state === "ready") {
    let rt = performance.now() - startTime;

    box.classList.remove("green");

    saveScore(rt);

    if (rt < 80 || isSuspicious()) {
      result.innerHTML = `<span class="warn">⚠ Score invalidated</span>`;
    } else {
      result.innerText = `Reaction: ${Math.round(rt)}ms`;
    }

    setTimeout(() => {
      resetBox();
    }, 800);

    state = "idle";
    mouseMoves = [];
  }
};

// ===================== LEADERBOARD =====================
function renderLeaderboard() {
  document.getElementById("leaderboard").innerHTML =
    leaderboard.map((x,i)=>
      `${i+1}. ${x.score}ms ${x.cheated ? "⚠" : ""}`
    ).join("<br>");
}

renderLeaderboard();
resetBox();

</script>

</body>
</html>
